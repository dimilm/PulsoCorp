# Frontend reverse-proxy in front of the FastAPI backend.
#
# Layout:
#   /            -> static SPA bundle (Vite build output in /usr/share/nginx/html)
#   /api/*       -> proxied to the `backend` service on port 8000
#   /healthz     -> cheap liveness endpoint for the compose healthcheck
#
# Notes:
#   - The container still runs as root because we listen on :80 (privileged
#     port). If you ever want a non-root nginx, switch the base image in
#     Dockerfile.frontend to `nginxinc/nginx-unprivileged:1.27-alpine` and
#     change `listen` below to 8080 plus the compose port mapping to
#     "8080:8080".
#   - Refresh-related backend endpoints can take a while (yfinance fetches),
#     hence the generous proxy_*_timeout values.

# Don't leak the nginx version in the `Server` header / error pages.
server_tokens off;

# Gzip text-ish responses. Brotli would be nicer but isn't in the stock
# alpine nginx build; gzip covers the common case.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/xml+rss
  application/atom+xml
  image/svg+xml;

server {
  listen 80;
  server_name _;

  # CSV upload endpoint accepts files via /api/v1/imports/csv. Cap the body
  # so a misbehaving / hostile client can't push arbitrarily large uploads
  # through the proxy. Bump if you legitimately need bigger imports.
  client_max_body_size 5m;

  # ---- Security headers (apply to every response, static + proxied) -----
  # Sent via add_header at the server scope so they also apply inside
  # nested locations (nginx inherits add_header from the closest scope
  # that defines one, so we deliberately do NOT redefine add_header in
  # /api/ or /assets/ -- those locations would otherwise lose these).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  # HSTS: only meaningful behind TLS. Keep it preload-ready but commented
  # so a plain-HTTP local run doesn't pin browsers to https://localhost.
  # Enable once you front this with a TLS terminator:
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Content-Security-Policy: opt-in. Recharts and React generally work with
  # the policy below, but verify in the browser's console after enabling
  # because any new third-party asset (analytics, fonts, etc.) will need a
  # whitelist entry.
  # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # ---- Liveness ---------------------------------------------------------
  # 200 OK without touching disk -- consumed by the compose healthcheck.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    default_type text/plain;
  }

  # ---- Hashed Vite assets: long-lived immutable cache -------------------
  # Vite emits content-hashed file names under /assets/, so we can cache
  # them aggressively. Anything else under / falls through to try_files.
  location ^~ /assets/ {
    root /usr/share/nginx/html;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    # Re-emit the security headers because `add_header` does NOT inherit
    # once a location defines its own. Keep this list in sync with the
    # server-scope block above.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # ---- SPA fallback -----------------------------------------------------
  # index.html itself must NOT be cached, otherwise users see stale bundles
  # after a deploy because their browser keeps serving the old hashed
  # script references.
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # ---- API proxy --------------------------------------------------------
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Refresh / AI scenario endpoints can take a while; raise from the
    # 60s default so long-running fetches don't 504 prematurely.
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Don't buffer responses -- run progress is consumed in real-ish time.
    proxy_buffering off;
  }
}
