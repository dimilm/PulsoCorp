# Default logging policy. Anchored once and reused per service so we don't
# end up with unbounded /var/lib/docker/containers/*-json.log files.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: sqlite:////data/sqlite.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env (generate via Fernet.generate_key())}
      SEED_JSON_PATH: ${SEED_JSON_PATH:-app/seed/stocks.seed.json}
    volumes:
      # Named volume (lives on ext4 inside the WSL2 VM). A host bind mount of
      # ../data does NOT work on Docker Desktop / Windows because the gRPC-FUSE
      # layer surfaces sub-paths as nobody:nobody with mode 0755 and rejects
      # writes even from container-root, which kills both Alembic and backups.
      - app_data:/data
    # Backend is reached via the nginx proxy in the frontend container, so we
    # only expose it inside the compose network. Override with `ports` in a
    # docker-compose.override.yml if you need direct access for debugging.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Cold start runs Alembic + seed import + yfinance imports, which can
      # easily take longer than a single 30s interval. The grace period
      # below stops failing probes from incrementing the retry counter
      # during that window so the container does not flip to "unhealthy"
      # while it is still legitimately starting.
      start_period: 90s
    # NOTE: deliberately NOT setting `security_opt: no-new-privileges` or
    # `cap_drop` here. The entrypoint chowns /data and uses gosu to drop
    # to the `app` user, which combination has reportedly broken under
    # `no-new-privileges` on some Docker Desktop / WSL2 builds.
    # NOTE: also deliberately NOT setting `deploy.resources.limits` -- the
    # Alembic + seed_import + pandas/yfinance import bursts during startup
    # comfortably exceed 768M and would silently OOM-kill the process,
    # leaving the healthcheck to time out without a useful log line.
    logging: *default-logging
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    # Plain `service_started` (the implicit default) means the SPA is
    # reachable on :8080 immediately even while Alembic is still running.
    # Trade-off: the very first /api/* requests can return 502 for a few
    # seconds. This is the lesser evil compared to `service_healthy`,
    # which would block the SPA forever if the backend healthcheck fails
    # for any reason.
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging: *default-logging
    restart: unless-stopped

  backup:
    image: alpine:3.20
    volumes:
      - app_data:/data
      - ./backup.sh:/backup.sh:ro
    command: ["sh", "/backup.sh"]
    # Backup uses `sqlite3 .backup` against the live DB. Waiting for the
    # backend to be healthy guarantees /data and the schema are in place
    # before the first snapshot attempt -- and unlike for the frontend,
    # blocking here is fine because there is nothing user-facing to serve.
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

volumes:
  app_data:
